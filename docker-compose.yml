services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-petir}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-petir}
      POSTGRES_DB: ${POSTGRES_DB:-petir}
    expose:
      - "5432"
    volumes:
      - petir_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-petir}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-petir}:${POSTGRES_PASSWORD:-petir}@postgres:5432/${POSTGRES_DB:-petir}
      DASHBOARD_AUTH_ENABLED: ${DASHBOARD_AUTH_ENABLED:-false}
      DASHBOARD_API_KEY: ${DASHBOARD_API_KEY:-}
      RATE_LIMIT_PER_NODE: ${RATE_LIMIT_PER_NODE:-120}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-}
    environment:
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://server:8000}
    depends_on:
      - server
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  petir_pg:
